# The backend ServiceAccount creates and watches worker Jobs in its own
# namespace and reads their pod logs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "coding-agent.fullname" . }}-worker
  labels:
    {{- include "coding-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "coding-agent.fullname" . }}-worker
  labels:
    {{- include "coding-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "coding-agent.fullname" . }}-worker
subjects:
  - kind: ServiceAccount
    name: {{ include "coding-agent.serviceAccountName" . }}
