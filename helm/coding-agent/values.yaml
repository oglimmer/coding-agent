# Default values for the coding-agent chart.
#
# The chart ships NO secrets. Provide a Kubernetes Secret (default name
# "<release>-coding-agent-secret", or set existingSecret) with these keys:
#   JWT_SECRET            random 32+ char string (session signing)
#   POSTGRES_PASSWORD     bundled Postgres password (when postgres.enabled)
#   DATABASE_URL          full DSN when using an external database
#   OIDC_CLIENT_SECRET    OIDC client secret (when auth.mode=oidc)
#   DEEPSEEK_API_KEY      DeepSeek API key (harmful-content gate + helper calls,
#                         and the worker model when worker.model is a deepseek/ one)
#   ANTHROPIC_API_KEY     Anthropic API key — required when worker.model /
#                         worker.editorModel is a claude model (optional otherwise)
#   WORKER_GITHUB_TOKEN   GitHub token the worker uses to push/PR/merge

nameOverride: ""
fullnameOverride: ""

# Existing secret to pull sensitive env from. Empty => "<fullname>-secret".
existingSecret: ""

# imagePullSecret for the container images. The ghcr.io/oglimmer packages are
# public, so this is empty by default. Set it to a docker-registry secret name
# only if you make the packages private. Applies to backend, frontend, and
# spawned worker Jobs.
imagePullSecret: ""

# External URL of the app (used for OIDC redirect + CORS).
publicBaseURL: "https://coding-agent.oglimmer.com"

auth:
  # "oidc" (production) or "password" (dev stub only).
  mode: oidc
  oidc:
    # Keycloak realm "oglimmer". Modern Keycloak URL scheme (no /auth prefix);
    # exposes .well-known/openid-configuration under this issuer.
    issuer: "https://id.oglimmer.de/realms/oglimmer"
    clientId: "coding-agent"
    scopes: "openid,profile,email"

deepseek:
  baseURL: "https://api.deepseek.com"
  model: "deepseek-chat"

worker:
  # Image the spawned Jobs run. -worker is a separate image from the backend.
  image: "ghcr.io/oglimmer/coding-agent-worker:latest"
  # Always (default) | IfNotPresent | Never. Use IfNotPresent/Never for a local
  # cluster where the worker image is loaded, not pulled from a registry.
  imagePullPolicy: "Always"
  # Aider runs in architect mode: `model` plans the change, `editorModel` turns
  # the plan into precise edits. Splitting the two is aider's main quality lever.
  # Running aider on Claude (requires ANTHROPIC_API_KEY in the worker secret).
  # The `anthropic/` prefix routes via LiteLLM; the worker auto-disables the
  # temperature/frequency_penalty knobs Claude rejects. Revert to
  # deepseek/deepseek-v4-pro + deepseek/deepseek-chat to go back to DeepSeek.
  model: "anthropic/claude-opus-4-8"
  editorModel: "anthropic/claude-sonnet-5"
  # The models a user may pick per-job (architect + editor) in the request form.
  # `model`/`editorModel` above are folded in automatically if omitted here.
  aiderModels:
    - "deepseek/deepseek-v4-pro"
    - "deepseek/deepseek-chat"
    - "anthropic/claude-opus-4-8"
    - "anthropic/claude-sonnet-5"
  # Alternative "claude-code" engine: a separate image running Anthropic's Claude
  # Code CLI. Its backend is switchable per model — a deepseek-* id runs on
  # DeepSeek (via DEEPSEEK_API_KEY), a claude-* id on the real Anthropic API (needs
  # ANTHROPIC_API_KEY in the worker secret). Chosen per-job in the request form.
  claudeImage: "ghcr.io/oglimmer/coding-agent-worker-claude:latest"
  # Default claude-code model. deepseek-v4-flash / claude-haiku-4-5 are used for
  # the subagent/haiku tier automatically inside the worker (tracking the backend).
  claudeModel: "deepseek-v4-pro"
  # The models a user may pick per-job for the claude-code engine (bare ids). Mix
  # deepseek-* and claude-* freely; each job routes to the matching backend.
  claudeModels:
    - "deepseek-v4-pro"
    - "deepseek-v4-flash"
    - "claude-opus-4-8"
    - "claude-sonnet-5"
  # Seconds a single Claude Code round may run before it is killed. Like
  # aiderTimeout, keep jobTimeout well above this (a job runs several rounds).
  claudeTimeout: 3600
  # Reviewer login the worker treats as "self" when waiting for the PR review.
  githubBotLogin: "coding-agent-bot"
  reviewMaxRounds: 3
  # Seconds a single aider round (plan+edit, or a review-fix round) may run before
  # it is killed. A whole job runs several rounds, so keep jobTimeout well above this.
  aiderTimeout: 3600
  jobTimeout: "120m"
  jobCooldown: "5m"
  maxConcurrentJobs: 3
  # Resource envelope for each worker Job pod. Sized for the heaviest workload —
  # a full JVM/Spring Boot @SpringBootTest under Maven forks two JVMs and needs
  # real headroom; the old 2Gi/100m box OOM/CPU-starved and died mid-startup,
  # failing the baseline verify before any coding happened. The cpu request must
  # be generous enough that the JVM isn't CFS-throttled during context boot.
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

serviceAccount:
  create: true
  name: ""
  annotations: {}

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/oglimmer/coding-agent-backend
    tag: "latest"
    pullPolicy: Always
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      # 500m throttled the process under job-log polling load, starving the
      # liveness probe into restarts; 1 core plus headroom for buffered log
      # tails keeps it responsive.
      cpu: 1000m
      memory: 512Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/oglimmer/coding-agent-frontend
    tag: "latest"
    pullPolicy: Always
  service:
    port: 80
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  securityContext: {}

postgres:
  enabled: true
  image:
    # Pin the MAJOR version: the data dir is tied to it (disable Renovate major bumps).
    repository: postgres
    tag: "16-alpine"
  database: coding_agent
  user: coding_agent
  storage: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  # Empty => inherit the cluster's default ingressClass (Traefik on this k3s
  # cluster — the only ingress controller). Matches the plugin-skill-hosting
  # chart. Do NOT set "nginx": no nginx controller exists, so the Ingress would
  # be left unclaimed and Traefik would serve its default self-signed cert
  # instead of the cert-manager one below.
  className: ""
  host: coding-agent.oglimmer.com
  annotations:
    cert-manager.io/cluster-issuer: "oglimmer-com-dns"
  tls:
    enabled: true
    # House convention (cf. tls-plugin-skill-hosting-ingress-dns,
    # tls-trivia-ingress-dns): tls-<app>-ingress-dns.
    secretName: tls-coding-agent-ingress-dns
