# ArgoCD Application syncing the coding-agent chart. The SealedSecret is a
# separate Application so secret rotation never touches the chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coding-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/oglimmer/coding-agent.git
    targetRevision: main
    path: helm/coding-agent
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: coding-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
