# Release: on a v* tag, build multi-arch images (backend, frontend, worker,
# worker-claude),
# push :vX.Y.Z + :latest, and cut a GitHub Release.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  images:
    # Native arm64 runner (cluster is arm64-only): build arm64 directly, no QEMU.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
          - name: frontend
            context: frontend
          - name: worker
            context: worker
          - name: worker-claude
            context: worker-claude
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VITE_APP_VERSION=${{ env.VERSION }}
            VITE_GIT_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/oglimmer/coding-agent-${{ matrix.name }}:${{ env.VERSION }}
            ghcr.io/oglimmer/coding-agent-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2
        with:
          generate_release_notes: true
