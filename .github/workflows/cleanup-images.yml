# Prune untagged ghcr.io image versions daily.
name: cleanup-images

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - coding-agent-backend
          - coding-agent-frontend
          - coding-agent-worker
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          package: ${{ matrix.package }}
          delete-untagged: true
          token: ${{ secrets.GITHUB_TOKEN }}
