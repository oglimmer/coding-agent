# Build & publish :latest images for changed components on pushes to main.
name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/build.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/build.yml'
            worker:
              - 'worker/**'
              - '.github/workflows/build.yml'

  build:
    needs: changes
    # In-cluster self-hosted ARC runner scale set (arm64, Docker-in-Docker),
    # matching the other oglimmer repos (arc-<repo> convention). The cluster is
    # arm64-only, so this also builds arm64 natively.
    runs-on: arc-coding-agent
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: backend
            flag: -b
            changed: ${{ needs.changes.outputs.backend }}
          - name: frontend
            flag: -f
            changed: ${{ needs.changes.outputs.frontend }}
          - name: worker
            flag: -w
            changed: ${{ needs.changes.outputs.worker }}
    steps:
      - if: matrix.changed == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - if: matrix.changed == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # --platform auto -> plain `docker build` + `docker push` via the DinD
      # daemon (native arm64). Avoids buildx's docker-container driver, whose push
      # session is unreliable on the in-cluster runner. oglimmer.sh passes all the
      # VERSION/GIT_COMMIT/VITE_* build-args and pushes :<version> + :latest.
      # The runner has no kubectl, so oglimmer.sh triggers the rollout via the
      # restart hook (restart.oglimmer.com) using the RESTART_TOKEN secret.
      - if: matrix.changed == 'true'
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build ${{ matrix.flag }} --platform auto
