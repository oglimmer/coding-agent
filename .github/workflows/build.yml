# Build & publish :latest images for changed components on pushes to main.
name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/build.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/build.yml'
            worker:
              - 'worker/**'
              - '.github/workflows/build.yml'

  build:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
            changed: ${{ needs.changes.outputs.backend }}
          - name: frontend
            context: frontend
            changed: ${{ needs.changes.outputs.frontend }}
          - name: worker
            context: worker
            changed: ${{ needs.changes.outputs.worker }}
    steps:
      - if: matrix.changed == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - if: matrix.changed == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: matrix.changed == 'true'
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: |
            VERSION=latest
            GIT_COMMIT=${{ github.sha }}
            VITE_GIT_COMMIT=${{ github.sha }}
          tags: ghcr.io/oglimmer/coding-agent-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
