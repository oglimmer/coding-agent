# Frontend nginx: serves the built SPA. In Kubernetes, /api routing is handled
# by the Ingress, so there is no proxy_pass here. For local docker-compose the
# compose file injects an upstream via BACKEND_HOST if desired.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/conf.d/security-headers.conf;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
